name: Pruebas de Navegador con Chrome

on: [push]

jobs:
  test-navegador:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar código
        uses: actions/checkout@v4

      # Descarga la llave e instala Chrome usando el método moderno compatible con Ubuntu
      - name: Instalar Google Chrome Estable
        run: |
          sudo apt-get update
          sudo apt-get install -y wget curl gnupg
          # Descarga e instala la firma digital de forma segura
          sudo mkdir -p /etc/apt/keyrings
          curl -fSsL https://google.com | sudo gpg --dearmor --yes -o /etc/apt/keyrings/google-chrome.gpg
          # Añade el repositorio oficial apuntando a la nueva llave
          echo "deb [arch=amd64 signed-by=/etc/apt/keyrings/google-chrome.gpg] http://google.com stable main" | sudo tee /etc/apt/sources.list.d/google-chrome.list
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      # Configura la simulación de pantalla y audio
      - name: Configurar pantalla y audio virtual para pruebas
        run: |
          sudo apt-get install -y xvfb alsa-utils
          Xvfb :99 -screen 0 1280x1024x24 &
          echo "DISPLAY=:99" >> $GITHUB_ENV

      # Verifica que el navegador se abra y funcione correctamente en la terminal
      - name: Verificar instalación de Chrome
        run: |
          echo "Google Chrome versión instalada:"
          google-chrome --version
          echo "Haciendo una prueba de carga rápida a Google:"
          google-chrome --headless --disable-gpu --dump-dom https://google.com
